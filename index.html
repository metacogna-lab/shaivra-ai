    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Tailwind Config -->
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              // Industry Aligned Theme (Command Amber / Dark Slate)
              charcoal: '#0C0D0F', // Slightly lighter than pure black for visibility
              'neutral-850': '#121417', // Surface
              
              // Frame/Structure
              spacegray: '#27272A', 
              'glass-border': '#3F3F46',
              
              // New Highlights
              'cyber-cyan': '#F59E0B',   // RENAMED TO AMBER/GOLD (kept var name to minimize refactor risk, represents Action)
              'electric-blue': '#0EA5E9', // Secondary Data Link Color (Sky Blue)
              'purpose-gold': '#F59E0B',  // Primary Brand Color
              'alert-crimson': '#EF4444', // Red
              'tactical-green': '#10B981', // Success/Safe
              
              // Text
              'text-primary': '#FAFAFA',
              'text-secondary': '#94A3B8', // Slate-400
            },
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              display: ['Space Grotesk', 'sans-serif'],
              mono: ['JetBrains Mono', 'monospace'],
            },
            maxWidth: {
              '8xl': '1440px',
            },
            spacing: {
              '18': '4.5rem',
              '22': '5.5rem',
            },
            animation: {
              'pulse-slow': 'pulse 8s cubic-bezier(0.4, 0, 0.6, 1) infinite',
              'float': 'float 8s ease-in-out infinite',
              'spin-slow': 'spin 12s linear infinite',
            },
            keyframes: {
              float: {
                '0%, 100%': { transform: 'translateY(0)' },
                '50%': { transform: 'translateY(-10px)' },
              }
            }
          }
        }
      }
    </script>
    
    <style>
      :root {
        --bg: #050505;
        --surface: #0a0a0a;
        --accent: #22d3ee; /* cyan-400 */
        --accent-glow: rgba(34, 211, 238, 0.3);
        --font-main: 'Inter', sans-serif;
        --font-display: 'Space Grotesk', sans-serif;
      }

      body {
        background-color: var(--bg);
        color: #f5f5f5;
        font-family: var(--font-main);
        overflow-x: hidden;
      }
      
      /* Custom Scrollbar - Minimal */
      ::-webkit-scrollbar {
        width: 4px;
      }
      ::-webkit-scrollbar-track {
        background: var(--bg);
      }
      ::-webkit-scrollbar-thumb {
        background: #333;
        border-radius: 0px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: var(--accent);
      }
      
      /* Cyberpunk Softening Edges */
      .cyber-card {
        background: var(--surface);
        border: 1px solid rgba(255, 255, 255, 0.05);
        border-radius: 12px;
        position: relative;
        overflow: hidden;
        transition: all 0.3s ease;
      }

      .cyber-card::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 1px;
        background: linear-gradient(90deg, transparent, var(--accent), transparent);
        opacity: 0;
        transition: opacity 0.3s ease;
      }

      .cyber-card:hover::before {
        opacity: 1;
      }

      .cyber-card:hover {
        border-color: rgba(34, 211, 238, 0.2);
        box-shadow: 0 0 20px var(--accent-glow);
      }

      .glass-panel {
        background: rgba(5, 5, 5, 0.8);
        backdrop-filter: blur(20px);
        border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      }
      
      /* Typography Refinement */
      h1, h2, h3, h4, h5, h6 {
        font-family: var(--font-display);
        letter-spacing: -0.03em;
      }
      p {
        letter-spacing: -0.01em;
      }

      @keyframes marquee {
        0% { transform: translateX(0); }
        100% { transform: translateX(-50%); }
      }

      .animate-marquee {
        display: flex;
        animation: marquee 30s linear infinite;
      }
    </style>
