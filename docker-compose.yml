version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: shaivra/app:latest
    env_file: .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://shaivra:shaivra@postgres:5432/shaivra}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      S3_ENDPOINT: ${S3_ENDPOINT:-http://minio:9000}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-minioadmin}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-minioadmin}
      S3_BUCKET: ${S3_BUCKET:-shaivra-uploads}
      QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    ports:
      - "${PORT:-3000}:3000"

  test:
    build:
      context: .
      dockerfile: Dockerfile
    image: shaivra/app:test
    command: ["bun","run","test"]
    env_file: .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://shaivra:shaivra@postgres:5432/shaivra}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333}
      PORT: 4000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    profiles: ["test"]

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-shaivra}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-shaivra}
      POSTGRES_DB: ${POSTGRES_DB:-shaivra}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL","pg_isready -U ${POSTGRES_USER:-shaivra}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: ["redis-server","--save","","--appendonly","no"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD","redis-cli","ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.13.3
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    healthcheck:
      test: ["CMD","/bin/sh","-c","curl -sSf http://localhost:6333/readyz > /dev/null"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-05Z
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY_ID:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_ACCESS_KEY:-minioadmin}
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD","curl","-f","http://localhost:9000/minio/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
  redis-data:
  qdrant-data:
  minio-data:
